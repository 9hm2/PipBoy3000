# PIP-BOY 3000 — Android build
#
# Manual-only trigger (workflow_dispatch). This workflow is never run on push,
# pull request, or schedule; you start it by hand from the Actions tab.
#
# Signing: the app signs with the constant debug.keystore that is committed at
# the repo root (alias androiddebugkey, store/key password "android"). Because
# that key travels with the repo, the build needs NO signing secrets and the
# produced APK has a stable, reproducible signature. This is a debug key, not a
# production signing key.
#
# Re-index trigger: this workflow is registered by GitHub when a commit lands on
# the default branch after Actions is enabled.
name: Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build variant to assemble"
        type: choice
        default: debug
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    # Needed so the built-in GITHUB_TOKEN can create a Release and upload the APK.
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble ${{ inputs.build_type }} APK
        run: |
          if [ "${{ inputs.build_type }}" = "release" ]; then
            ./gradlew assembleRelease --stacktrace
          else
            ./gradlew assembleDebug --stacktrace
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipboy3000-${{ inputs.build_type }}-apk
          path: app/build/outputs/apk/${{ inputs.build_type }}/*.apk
          if-no-files-found: error

      # Publish the APK to the repository's Releases page (one release per run).
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: PIP-BOY 3000 — ${{ inputs.build_type }} build #${{ github.run_number }}
          body: |
            Automated ${{ inputs.build_type }} build of PIP-BOY 3000.

            - Commit: ${{ github.sha }}
            - Signed with the constant committed debug key (not a production key).
            - Install with: `adb install -r <apk>`
          files: app/build/outputs/apk/${{ inputs.build_type }}/*.apk
          fail_on_unmatched_files: true
